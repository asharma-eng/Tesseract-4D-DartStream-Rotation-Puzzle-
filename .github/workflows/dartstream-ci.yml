name: DartStream CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install root CLI dependencies
        run: dart pub get
        working-directory: projects/tesseract

      - name: Install Flutter client dependencies
        run: flutter pub get
        working-directory: projects/tesseract/flutter_client

      - name: Analyze CLI project
        run: dart analyze
        working-directory: projects/tesseract

      - name: Analyze Flutter client
        run: flutter analyze
        working-directory: projects/tesseract/flutter_client

      - name: Run Flutter client tests
        run: flutter test
        working-directory: projects/tesseract/flutter_client

      - name: Build Flutter Web Client
        run: flutter build web --dart-define=FIREBASE_API_KEY=AIzaSyC5ImF7HStDsFZwIEcpvBzqblnPolBZHxk
        working-directory: projects/tesseract/flutter_client

      - name: Install DartStream CLI
        run: |
          dart pub global activate ds_dartstream 0.0.7
          PUB_CACHE_DIR="${PUB_CACHE:-$HOME/.pub-cache}"
          if [ -d "$PUB_CACHE_DIR/hosted/pub.dev/ds_dartstream-0.0.7" ]; then
            cp -r "$PUB_CACHE_DIR/hosted/pub.dev/ds_dartstream-0.0.7" ./temp_ds
          elif [ -d "$PUB_CACHE_DIR/hosted/pub.dartlang.org/ds_dartstream-0.0.7" ]; then
            cp -r "$PUB_CACHE_DIR/hosted/pub.dartlang.org/ds_dartstream-0.0.7" ./temp_ds
          else
            echo "Error: ds_dartstream-0.0.7 not found in cache"
            exit 1
          fi
          dart pub global activate --source path ./temp_ds/packages/cli/ds_cli
          echo "=== DEBUG INFO ==="
          dart pub global list
          which dartstream || echo "which failed"
          dartstream --help || echo "dartstream --help failed"
          ls -la $PUB_CACHE_DIR/bin || echo "ls bin failed"
          cat $PUB_CACHE_DIR/bin/dartstream || echo "cat dartstream failed"

      - name: Validate project
        run: dartstream validate --project tesseract
        env:
          DARTSTREAM_TOKEN: ${{ secrets.DARTSTREAM_TOKEN }}

      - name: Generate configuration
        run: dartstream configure --name tesseract --skip-examples

      - name: Deploy to Firebase Hosting
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting --project aortem-sample-apps --token "$FIREBASE_TOKEN"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
